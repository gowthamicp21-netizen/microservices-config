server.port=5555

spring.cloud.gateway.server.webmvc.routes[0].id=orderservice
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://ORDERSERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/orders/**

spring.cloud.gateway.server.webmvc.routes[1].id=productservice
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://PRODUCTSERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/**


jwt.secret=${JWT_SECRET}

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
